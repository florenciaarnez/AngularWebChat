<form [formGroup]="messageform" (ngSubmit)="saveMessage()">
    <input type="text" formControlName="text" placeholder="Escribe tu mensaje..."/>
    @if (messageform.get('text')?.invalid && messageform.get('text')?.touched) {
  <p>No se puede enviar un mensaje vacío</p>
  }
    <button type="submit">Enviar</button>
</form>
